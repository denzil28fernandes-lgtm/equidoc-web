            direction: ltr;

<script>
    function selectLanguage(element) {
        document.querySelectorAll('.language-card').forEach(card => {
            card.classList.remove('active', 'border-primary', 'border-2');
            card.classList.add('border-outline-variant', 'border');
            card.style.backgroundColor = '';
            
            const icon = card.querySelector('.material-symbols-outlined');
            icon.innerText = 'circle';
            icon.classList.add('hidden');
            icon.style.fontVariationSettings = "'FILL' 0";
        });

        element.classList.add('active', 'border-2', 'border-primary');
        element.classList.remove('border-outline-variant', 'border');
        element.style.backgroundColor = '#e6eeff';
        
        const activeIcon = element.querySelector('.material-symbols-outlined');
        activeIcon.innerText = 'check_circle';
        activeIcon.classList.remove('hidden');
        activeIcon.classList.add('text-primary');
        activeIcon.style.fontVariationSettings = "'FILL' 1";

        if (window.navigator.vibrate) {
            window.navigator.vibrate(10);
        }
    }
</script>
